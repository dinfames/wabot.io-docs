site_name: Wabot.io Documentation
site_description: Complete bilingual tutorial and documentation for Wabot.io — the all-in-one WhatsApp automation platform.
site_author: Izzuddin Ibrahim
site_url: https://dinfames.github.io/wabot.io-docs/
repo_name: dinfames/wabot.io-docs
repo_url: https://github.com/dinfames/wabot.io-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.tooltips
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dinfames/wabot.io-docs
    - icon: fontawesome/brands/whatsapp
      link: https://wa.me/60125153307
    - icon: fontawesome/solid/globe
      link: https://wabot.io
  generator: false

copyright: >
  Copyright &copy; 2026 Wabot.io Documentation —
  Not affiliated with WhatsApp Inc. or Team Fames Sdn Bhd.

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/overview.md
      - Sign Up & Login: getting-started/signup.md
      - Dashboard Tour: getting-started/dashboard.md
      - Connect WhatsApp Account: getting-started/connect-account.md
      - Send Your First Message: getting-started/first-message.md
  - Core Features:
      - Overview: features/index.md
      - Chatbots: features/chatbots.md
      - Broadcast: features/broadcast.md
      - Automation: features/automation.md
      - Autoresponder: features/autoresponder.md
      - Live Chat: features/live-chat.md
      - Templates: features/templates.md
  - Managing Contacts:
      - Audience & Groups: contacts/audience.md
      - Contacts: contacts/contacts.md
  - Tools & Utilities:
      - File Manager: tools/file-manager.md
      - Queue Message: tools/queue.md
      - Link Generator: tools/link-generator.md
  - Integrations:
      - Overview: integrations/index.md
      - Google Sheets: integrations/google-sheets.md
      - WordPress: integrations/wordpress.md
      - Pabbly / Make / Funnelkit: integrations/automation-platforms.md
      - Webhooks & API: integrations/webhooks.md
  - Pricing & Plans: pricing.md
  - FAQ: faq.md
  - Panduan Bahasa Melayu:
      - Pengenalan: ms/index.md
      - Mula di Sini: ms/mula.md
      - Ciri-ciri Utama: ms/ciri-ciri.md
      - Soalan Lazim: ms/soalan-lazim.md
